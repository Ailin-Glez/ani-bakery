<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Bread loaf body -->
  <rect x="6" y="24" width="36" height="16" rx="4" fill="#7B4A2D"/>
  <!-- Bread dome top -->
  <ellipse cx="24" cy="24" rx="18" ry="10" fill="#A0613A"/>
  <!-- Highlight on dome -->
  <ellipse cx="20" cy="20" rx="7" ry="4" fill="#C4412A" opacity="0.5"/>
  <!-- Score line across bread -->
  <path d="M10 24 Q24 19 38 24" stroke="#4A2410" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Small wheat/grain dots -->
  <circle cx="24" cy="35" r="1.5" fill="#F8F0E3" opacity="0.6"/>
  <circle cx="18" cy="35" r="1.5" fill="#F8F0E3" opacity="0.6"/>
  <circle cx="30" cy="35" r="1.5" fill="#F8F0E3" opacity="0.6"/>
</svg>
